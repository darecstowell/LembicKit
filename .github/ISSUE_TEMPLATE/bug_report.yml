name: Bug report
description: Something in the engine or the CLI behaves incorrectly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please do not paste real private messages or attach a real `chat.db`.
        Reproduce with the synthetic database in `Examples/` where you can, or with a small made-up example.
  - type: input
    id: version
    attributes:
      label: LembicKit version
      description: A release tag (for example 0.2.0) or the commit you built from.
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      description: The Messages database schema tracks the OS version, so this matters.
      placeholder: "macOS 14.5"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you see? Include the exact output or error text.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact commands or API calls. Use the `Examples/` database or synthetic data, never real messages.
      placeholder: |
        1. swift run lembic-cli export Examples/chat.db --chat-id 6 --target-handles 6 --number +15035550146 --out-dir .
        2. ...
    validations:
      required: true
